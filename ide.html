<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fudgel IDE — Browser Preview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0800;
      --bg-1:      #130e03;
      --border:    #3a2308;
      --border-2:  #6b4010;
      --amber:     #d97b0e;
      --amber-lt:  #f5ce6e;
      --rust:      #c84810;
      --teal:      #2db8b0;
      --cream:     #eedaaa;
      --text-2:    #b09050;
      --text-3:    #6a4828;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Chrome bar ──────────────────────────────────────────── */

    #chrome {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      z-index: 10;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-2);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.08em;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      color: var(--amber-lt);
      border-color: var(--border-2);
    }

    .back-arrow {
      font-size: 14px;
      line-height: 1;
    }

    .chrome-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    .chrome-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .chrome-hex {
      font-size: 18px;
      color: var(--amber-lt);
      line-height: 1;
    }

    .chrome-wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.1em;
      color: var(--cream);
    }

    .chrome-sub {
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.08em;
    }

    .chrome-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .badge-text {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--teal);
    }

    /* ── IDE iframe ──────────────────────────────────────────── */

    #ide-wrap {
      position: fixed;
      top: 48px;
      left: 0; right: 0; bottom: 0;
    }

    #ide-wrap iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="chrome">
    <a href="index.html" class="back-btn">
      <span class="back-arrow">&#8592;</span>
      Back
    </a>
    <div class="chrome-divider"></div>
    <div class="chrome-logo">
      <span class="chrome-hex">⬡</span>
      <span class="chrome-wordmark">Fudgel</span>
    </div>
    <span class="chrome-sub">Browser IDE</span>
    <div class="chrome-badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Live Parser</span>
    </div>
  </div>

  <div id="ide-wrap">
    <iframe
      src="IDE/index.html"
      title="Fudgel IDE"
      sandbox="allow-scripts allow-same-origin"
    ></iframe>
  </div>

</body>
</html>
